<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FinLeo Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body{font-family:Arial,sans-serif;margin:0;background:#0b1020;color:#e8eefc}
    .wrap{max-width:1200px;margin:0 auto;padding:24px}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
    .card{background:#121933;border:1px solid #263055;border-radius:16px;padding:18px}
    .title{font-size:13px;color:#9fb0e6;margin-bottom:8px}
    .value{font-size:28px;font-weight:700}
    .section{margin-top:24px}
    .two{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .toolbar{display:flex;gap:12px;align-items:end;flex-wrap:wrap;margin:16px 0}
    label{display:flex;flex-direction:column;gap:6px;font-size:14px;color:#9fb0e6}
    input,select,button{background:#121933;color:#e8eefc;border:1px solid #263055;border-radius:10px;padding:10px 12px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px 8px;border-bottom:1px solid #263055}
    th{color:#9fb0e6}
    .meta-row{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;margin-bottom:8px}
    .progress{height:10px;background:#0b1020;border-radius:999px;overflow:hidden;border:1px solid #263055}
    .bar{height:100%;background:#7aa2ff}
    @media (max-width:900px){.grid,.two{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>FinLeo Dashboard</h1>

    <div class="toolbar">
      <label>Mês
        <input type="month" id="monthFilter" />
      </label>
      <label>Categoria
        <select id="categoryFilter">
          <option value="">Todas</option>
        </select>
      </label>
      <button id="applyBtn">Aplicar</button>
      <button id="clearBtn">Limpar</button>
    </div>

    <div class="grid">
      <div class="card"><div class="title">Saldo do período</div><div class="value" id="saldoAtual">-</div></div>
      <div class="card"><div class="title">Gastos do período</div><div class="value" id="gastoMes">-</div></div>
      <div class="card"><div class="title">Receitas do período</div><div class="value" id="receitaMes">-</div></div>
      <div class="card"><div class="title">Saldo total</div><div class="value" id="saldoTotal">-</div></div>
    </div>

    <div class="section two">
      <div class="card">
        <div class="title">Gastos por categoria</div>
        <canvas id="catChart"></canvas>
      </div>
      <div class="card">
        <div class="title">Gastos por dia</div>
        <canvas id="dayChart"></canvas>
      </div>
    </div>

    <div class="section two">
      <div class="card">
        <div class="title">Metas</div>
        <div id="metasBox"></div>
      </div>
      <div class="card">
        <div class="title">Últimos lançamentos</div>
        <table>
          <thead>
            <tr><th>ID</th><th>Data</th><th>Tipo</th><th>Valor</th><th>Categoria</th><th>Descrição</th></tr>
          </thead>
          <tbody id="latestBody"></tbody>
        </table>
      </div>
    </div>
  </div>

<script>
let catChart;
let dayChart;

function money(v){ return 'R$ ' + Number(v || 0).toFixed(2).replace('.', ','); }

function currentMonthValue() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

async function loadCategories() {
  const res = await fetch('/api?month=' + encodeURIComponent(document.getElementById('monthFilter').value || currentMonthValue()));
  const data = await res.json();
  const sel = document.getElementById('categoryFilter');
  const prev = sel.value;
  const cats = Object.keys(data.byCategory || {}).sort();
  sel.innerHTML = '<option value="">Todas</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
  if ([...sel.options].some(o => o.value === prev)) sel.value = prev;
}

async function load() {
  const month = document.getElementById('monthFilter').value || currentMonthValue();
  const category = document.getElementById('categoryFilter').value || '';
  const qs = new URLSearchParams({ month });
  if (category) qs.set('category', category);

  const res = await fetch('/api?' + qs.toString());
  const data = await res.json();

  document.getElementById('saldoAtual').textContent = money(data.saldo || 0);
  document.getElementById('gastoMes').textContent = money(data.gasto || 0);
  document.getElementById('receitaMes').textContent = money(data.receita || 0);

  const totalRes = await fetch('/api?month=' + encodeURIComponent(currentMonthValue()));
  const totalData = await totalRes.json();
  document.getElementById('saldoTotal').textContent = money(totalData.saldo || 0);

  const latestBody = document.getElementById('latestBody');
  latestBody.innerHTML = '';
  (data.ultimos || []).forEach(row => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${row.id}</td>
      <td>${new Date(row.data).toLocaleString('pt-BR')}</td>
      <td>${row.tipo}</td>
      <td>${money(row.valor)}</td>
      <td>${row.categoria}</td>
      <td>${row.descricao || ''}</td>
    `;
    latestBody.appendChild(tr);
  });

  const catLabels = Object.keys(data.byCategory || {});
  const catValues = Object.values(data.byCategory || {});

  if (catChart) {
    catChart.data.labels = catLabels;
    catChart.data.datasets[0].data = catValues;
    catChart.update();
  } else {
    catChart = new Chart(document.getElementById('catChart'), {
      type: 'bar',
      data: { labels: catLabels, datasets: [{ label: 'R$', data: catValues }] },
      options: { responsive: true, plugins: { legend: { display: false } } }
    });
  }

  const days = Object.keys(data.byDay || {}).sort();
  const dayValues = days.map(d => data.byDay[d]);

  if (dayChart) {
    dayChart.data.labels = days;
    dayChart.data.datasets[0].data = dayValues;
    dayChart.update();
  } else {
    dayChart = new Chart(document.getElementById('dayChart'), {
      type: 'line',
      data: { labels: days, datasets: [{ label: 'R$', data: dayValues }] },
      options: { responsive: true, plugins: { legend: { display: false } } }
    });
  }

  const metasBox = document.getElementById('metasBox');
  metasBox.innerHTML = '';
  (data.metas || []).forEach(meta => {
    const pct = Math.min(meta.percentual || 0, 100);
    const div = document.createElement('div');
    div.className = 'meta-row';
    div.innerHTML = `
      <div>
        <div><strong>${meta.categoria}</strong></div>
        <div>${money(meta.gasto)} / ${money(meta.meta)} (${(meta.percentual || 0).toFixed(0)}%)</div>
        <div class="progress"><div class="bar" style="width:${pct}%"></div></div>
      </div>
      <div>${(meta.percentual || 0) >= 100 ? '🚨' : (meta.percentual || 0) >= 80 ? '⚠️' : '✅'}</div>
      <div></div>
    `;
    metasBox.appendChild(div);
  });
}

document.getElementById('monthFilter').value = currentMonthValue();
document.getElementById('applyBtn').onclick = () => load();
document.getElementById('clearBtn').onclick = () => {
  document.getElementById('monthFilter').value = currentMonthValue();
  document.getElementById('categoryFilter').value = '';
  load();
};

loadCategories().then(load);
setInterval(load, 50000);
</script>
</body>
</html>
